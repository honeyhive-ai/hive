name: ci

# Cross-platform CI: builds + tests the Rust workspace and the web frontend.
# Covers crates/, app/, and web/.
on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "app/**"
      - "web/**"
      - "Cargo.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "crates/**"
      - "app/**"
      - "web/**"
      - "Cargo.toml"
      - ".github/workflows/ci.yml"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest
          - os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux Tauri system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install web deps
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Check ts-rs bindings are in sync
        shell: bash
        run: |
          cargo test -p hive-proto export_bindings
          if ! git diff --quiet -- web/src/bindings; then
            echo "::error::ts-rs bindings are stale — run 'cargo test -p hive-proto export_bindings' and commit web/src/bindings/"
            git diff -- web/src/bindings
            exit 1
          fi

      - name: Cargo test (workspace)
        run: cargo test --workspace

      - name: Web typecheck + build
        working-directory: web
        run: bun run build

      - name: Tauri build
        run: cargo build -p Hive --release
