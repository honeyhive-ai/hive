name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install mkdocs
        # Pin to the 9.x line — mkdocs-material 2.0 rewrote the theming system
        # and breaks our overrides.
        run: pip install "mkdocs-material>=9,<10"
      - name: Build site
        # Not --strict: several pages link screenshots that haven't been captured
        # yet (see docs-site images/CAPTURE_GUIDE.md). Warnings stay visible
        # without failing the build; re-enable --strict once the images land.
        run: mkdocs build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
